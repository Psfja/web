<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | 学生登录</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <!-- 背景光效 -->
    <div class="ambient-light"></div>
    <div class="scan-line"></div>

    <!-- 登录容器 -->
    <div class="login-container">
        <!-- 登录面板 -->
        <div class="login-panel">
            <!-- 品牌标识 -->
            <div class="brand">
                <i class="ri-code-s-slash-line"></i>
                <span>NEXUS</span>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form active">
                <h2>学生登录</h2>
                <div class="form-group">
                    <label for="login-student-id">学号</label>
                    <input type="text" id="login-student-id" name="studentId" placeholder="请输入学号" required>
                    <i class="ri-user-line"></i>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" placeholder="请输入密码" required>
                    <i class="ri-lock-line"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                <button type="submit" class="auth-btn">登录</button>
                <div class="form-switch">
                    <p>还没有账号？<a href="#" onclick="switchForm('register')">立即注册</a></p>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form">
                <h2>学生注册</h2>
                <div class="form-group">
                    <label for="reg-student-id">学号</label>
                    <input type="text" id="reg-student-id" name="studentId" placeholder="请输入学号" required>
                    <i class="ri-user-line"></i>
                </div>
                <div class="form-group">
                    <label for="reg-name">姓名</label>
                    <input type="text" id="reg-name" name="name" placeholder="请输入姓名" required>
                    <i class="ri-user-smile-line"></i>
                </div>
                <div class="form-group">
                    <label for="reg-major">专业</label>
                    <input type="text" id="reg-major" name="major" placeholder="请输入专业" required>
                    <i class="ri-book-line"></i>
                </div>
                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" name="email" placeholder="请输入邮箱" required>
                    <i class="ri-mail-line"></i>
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" name="password" placeholder="请输入密码" required minlength="6">
                    <i class="ri-lock-line"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-password')">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
                <div class="form-group">
                    <label for="reg-confirm-password">确认密码</label>
                    <input type="password" id="reg-confirm-password" name="confirmPassword" placeholder="请确认密码" required minlength="6">
                    <i class="ri-lock-check-line"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-confirm-password')">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
                <button type="submit" class="auth-btn">注册</button>
                <div class="form-switch">
                    <p>已有账号？<a href="#" onclick="switchForm('login')">立即登录</a></p>
                </div>
            </form>
        </div>

        <!-- 右侧装饰 -->
        <div class="login-decoration">
            <div class="decoration-content">
                <h3>WELCOME TO</h3>
                <h1>NEXUS</h1>
                <p>学生教务管理系统</p>
                <div class="features">
                    <div class="feature">
                        <i class="ri-book-open-line"></i>
                        <span>课程管理</span>
                    </div>
                    <div class="feature">
                        <i class="ri-calendar-line"></i>
                        <span>智能排课</span>
                    </div>
                    <div class="feature">
                        <i class="ri-graduation-cap-line"></i>
                        <span>学籍管理</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
