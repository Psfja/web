<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | 学生终端</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="student-style.css">
</head>
<body>
    <!-- 背景光效 -->
    <div class="ambient-light"></div>
    <div class="scan-line"></div>

    <div class="layout">
        <!-- 科技感侧边栏 -->
        <aside class="cyber-sidebar">
            <div class="brand">
                <i class="ri-code-s-slash-line"></i>
                <span>NEXUS</span>
            </div>
            
            <div class="user-status">
                <img src="https://ui-avatars.com/api/?name=Z&background=0ea5e9&color=fff" alt="Avatar">
                <div class="status-text">
                    <h3 id="nav-name">LOADING...</h3>
                    <p class="status-indicator"><span class="blink"></span> ONLINE</p>
                </div>
            </div>

            <nav>
                <button class="nav-btn active" onclick="switchTab('dashboard')">
                    <i class="ri-dashboard-3-line"></i> 概览控制台
                </button>
                <button class="nav-btn" onclick="switchTab('enroll')">
                    <i class="ri-add-circle-line"></i> 选课中心
                </button>
                <button class="nav-btn" onclick="switchTab('schedule')">
                    <i class="ri-calendar-event-line"></i> 课程日程
                </button>
                <button class="nav-btn" onclick="switchTab('profile')">
                    <i class="ri-user-settings-line"></i> 学籍档案
                </button>
                <button class="nav-btn logout-btn" onclick="logout()">
                    <i class="ri-logout-box-line"></i> 退出登录
                </button>
            </nav>

            <div class="system-info">
                <p>SYS.VER: 4.2.0</p>
                <p>PING: 12ms</p>
            </div>
        </aside>

        <!-- 主界面 -->
        <main class="cyber-main">
            <!-- 1. 仪表盘 -->
            <section id="tab-dashboard" class="tab-content active">
                <header class="cyber-header">
                    <h1>DASHBOARD // <span class="sub-text">实时概览</span></h1>
                    <div class="time-display" id="clock">00:00:00</div>
                </header>

                <div class="stats-row">
                    <div class="cyber-card stat">
                        <div class="stat-icon"><i class="ri-book-mark-line"></i></div>
                        <div class="stat-data">
                            <h3>已选课程</h3>
                            <span class="glitch-text" id="stat-count">0</span>
                        </div>
                    </div>
                    <div class="cyber-card stat">
                        <div class="stat-icon"><i class="ri-medal-line"></i></div>
                        <div class="stat-data">
                            <h3>平均绩点</h3>
                            <span>3.85</span>
                        </div>
                    </div>
                    <div class="cyber-card stat">
                        <div class="stat-icon"><i class="ri-timer-flash-line"></i></div>
                        <div class="stat-data">
                            <h3>本周课时</h3>
                            <span>12h</span>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">我的课程列表 // ACTIVE_COURSES</h2>
                <div class="course-grid" id="my-course-grid">
                    <!-- JS 渲染 -->
                </div>
            </section>

            <!-- 2. 选课中心 -->
            <section id="tab-enroll" class="tab-content" style="display:none;">
                <header class="cyber-header">
                    <h1>MARKETPLACE // <span class="sub-text">全校选课</span></h1>
                </header>
                <div class="filter-bar">
                    <input type="text" placeholder="检索课程代码/名称..." class="cyber-input">
                    <button class="cyber-btn">SEARCH</button>
                </div>
                <div class="list-container">
                    <table class="cyber-table">
                        <thead>
                            <tr>
                                <th>CODE</th>
                                <th>COURSE NAME</th>
                                <th>INSTRUCTOR</th>
                                <th>CREDITS</th>
                                <th>CAPACITY</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="available-course-tbody">
                            <!-- JS 渲染 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 3. 日程表 -->
            <section id="tab-schedule" class="tab-content" style="display:none;">
                <header class="cyber-header">
                    <h1>SCHEDULE // <span class="sub-text">时间轴</span></h1>
                </header>
                <div class="cyber-card">
                    <!-- 日历导航 -->
                    <div class="calendar-nav">
                        <button class="calendar-btn" id="prevMonth"><i class="ri-arrow-left-line"></i></button>
                        <h2 id="currentMonth"></h2>
                        <button class="calendar-btn" id="nextMonth"><i class="ri-arrow-right-line"></i></button>
                        <button class="calendar-btn" id="todayBtn">TODAY</button>
                    </div>
                    
                    <!-- 日历网格 -->
                    <div class="calendar-container">
                        <!-- 星期标题 -->
                        <div class="calendar-weekdays">
                            <div class="weekday">日</div>
                            <div class="weekday">一</div>
                            <div class="weekday">二</div>
                            <div class="weekday">三</div>
                            <div class="weekday">四</div>
                            <div class="weekday">五</div>
                            <div class="weekday">六</div>
                        </div>
                        <!-- 日期网格 -->
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>
                    
                    <!-- 今日课程列表 -->
                    <div class="today-courses">
                        <h3>TODAY'S COURSES</h3>
                        <div id="todayCourseList"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="student-script.js"></script>
</body>
</html>
