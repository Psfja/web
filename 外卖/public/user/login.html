<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FlavorDash</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 独立登录页面样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #f8f9fa;
            perspective: 1000px; /* 为3D效果准备 */
        }

        /* 背景图片容器 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1950&q=60'),
                url('https://images.unsplash.com/photo-1556911220-bff31c812dba?auto=format&fit=crop&w=1950&q=60'),
                url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1950&q=60'),
                url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1950&q=60');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-blend-mode: multiply;
            opacity: 0.7;
            z-index: 0;
            animation: backgroundAnimation 30s infinite;
        }

        /* 背景动画效果 */
        @keyframes backgroundAnimation {
            0% {
                background-position: 0% 0%, 100% 0%, 0% 100%, 100% 100%;
            }
            25% {
                background-position: 100% 0%, 0% 0%, 100% 100%, 0% 100%;
            }
            50% {
                background-position: 100% 100%, 0% 100%, 100% 0%, 0% 0%;
            }
            75% {
                background-position: 0% 100%, 100% 100%, 0% 0%, 100% 0%;
            }
            100% {
                background-position: 0% 0%, 100% 0%, 0% 100%, 100% 100%;
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 420px;
            max-width: 90%;
            padding: 50px 40px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* 平滑恢复原状的过渡 */
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 40px;
            transform: translateZ(30px); /* 视差分层 */
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .app-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .app-slogan {
            color: #666;
            font-size: 15px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .login-methods {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            transform: translateZ(20px);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            /* 取消自带的hover位移，交给JS接管 */
            transition: box-shadow 0.3s ease, background 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-wechat {
            background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
        }

        .btn-wechat:hover {
            background: linear-gradient(135deg, #06AD56 0%, #05994D 100%);
        }

        .btn-qq {
            background: linear-gradient(135deg, #12B7F5 0%, #0DA1E3 100%);
        }

        .btn-qq:hover {
            background: linear-gradient(135deg, #0DA1E3 0%, #0B8ED6 100%);
        }

        .login-btn i {
            font-size: 28px;
        }

        .login-note {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
            transform: translateZ(10px);
        }

        .login-note a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-note a:hover {
            text-decoration: underline;
            color: #5568d3;
        }

        .error-message {
            background: #fff5f5;
            color: #ff4d4f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffccc7;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
                margin: 20px;
            }

            .app-name {
                font-size: 24px;
            }

            .login-title {
                font-size: 22px;
            }

            .login-btn {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginCard">
        <div class="logo-section">
            <div class="logo">
                <i class="ri-fire-fill"></i>
            </div>
            <h1 class="app-name">FlavorDash</h1>
            <p class="app-slogan">高端外卖，品质生活</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <h2 class="login-title">登录/注册</h2>

        <div class="login-methods">
            <button class="login-btn btn-wechat" onclick="loginWithWechat()">
                <i class="ri-wechat-pay-fill"></i>
                微信一键登录
            </button>
            <button class="login-btn btn-qq" onclick="loginWithQQ()">
                <i class="ri-qq-fill"></i>
                QQ一键登录
            </button>
        </div>

        <p class="login-note">
            登录即代表同意<a href="#">用户协议</a>和<a href="#">隐私政策</a>
        </p>
    </div>

    <script>
        // 核心交互 1: 卡片 3D 视差倾斜效果
        const card = document.getElementById('loginCard');
        document.body.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        document.body.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 核心交互 2: 按钮磁性吸附效果 (Magnetic Buttons)
        const buttons = document.querySelectorAll('.login-btn');
        buttons.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                // 按钮轻微向鼠标方向偏移
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                // 鼠标离开，弹簧般归位
                btn.style.transform = 'translate(0px, 0px)';
                btn.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
            btn.addEventListener('mouseenter', () => {
                btn.style.transition = 'none'; // 进入时取消动画，让跟随更跟手
            });
        });

        // 从URL获取错误信息
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = decodeURIComponent(error);
            errorMessage.classList.add('show');
        }

        // 微信登录
        async function loginWithWechat() {
            try {
                const mockUserInfo = {
                    nickName: '微信用户_' + Math.floor(Math.random() * 1000),
                    avatarUrl: `https://api.dicebear.com/7.x/avataaars/svg?seed=wechat_${Date.now()}`
                };
                
                const res = await fetch('/api/auth/wechat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: 'mock_code_' + Date.now(),
                        userInfo: mockUserInfo
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // 保存用户信息到localStorage
                    localStorage.setItem('flavordash_user', JSON.stringify(data.user));
                    localStorage.setItem('flavordash_logged_in', 'true');
                    
                    // 跳转到主页面
                    window.location.href = '/user/index.html';
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (err) {
                showError('登录失败，请稍后重试');
            }
        }

        // QQ登录
        async function loginWithQQ() {
            try {
                const mockUserInfo = {
                    nickname: 'QQ用户_' + Math.floor(Math.random() * 1000),
                    figureurl_qq_2: `https://api.dicebear.com/7.x/avataaars/svg?seed=qq_${Date.now()}`
                };
                
                const res = await fetch('/api/auth/qq', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: 'mock_code_' + Date.now(),
                        userInfo: mockUserInfo
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // 保存用户信息到localStorage
                    localStorage.setItem('flavordash_user', JSON.stringify(data.user));
                    localStorage.setItem('flavordash_logged_in', 'true');
                    
                    // 跳转到主页面
                    window.location.href = '/user/index.html';
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (err) {
                showError('登录失败，请稍后重试');
            }
        }

        // 显示错误信息
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            
            // 3秒后自动隐藏
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
